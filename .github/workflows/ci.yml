name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci || npm install
      - run: npm test
        env:
          # Keep the suite off any real data dir; everything it needs is created fresh.
          AIOS_DATA: ${{ runner.temp }}/aios-data
