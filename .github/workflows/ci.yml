name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Defense-in-depth: block secrets/private data reaching the repo, alongside the local git hooks
      # (bin/install-hooks) and GitHub's own push protection. Runs before install so it fails fast.
      - name: Secret & private-data scan
        run: node scripts/scan-secrets.mjs
      - run: npm ci || npm install
      - run: npm test
        env:
          # Keep the suite off any real data dir; everything it needs is created fresh.
          AIOS_DATA: ${{ runner.temp }}/aios-data
