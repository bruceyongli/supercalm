<!doctype html>
<html lang="en">
  <head>
  <script>
    // The desktop STORY view is the session default at EVERY width (operator's ask). The mobile dashboard
    // is the phone triage (desktop.html), and its session links open THIS desktop story view (phone.js) —
    // so you browse in phone, read here. ?phone=1 opens the phone companion for this one session.
    (() => {
      const q = new URLSearchParams(location.search);
      if (q.get('phone') === '1') { location.replace('phone#s/' + (q.get('id') || '')); }
    })();
  </script>

    <meta charset="utf-8" />
    <base href="/aios/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0f16" />
    <title>Supercalm · session</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="vendor/xterm.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- app-shell sidebar styles (dk-*), loaded BEFORE styles.css so the session-specific layout wins on any global (*/body) conflict -->
  <link rel="stylesheet" href="desktop.css" />
  <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="session-page">
    <!-- The standalone session page mirrors the SPA shell (web/app.html): the ONE persistent flush sidebar
         + a #view that fixed-fills the area to its right. The session view itself (the .session-shell grid +
         every panel) is provided by web/session.js: mountSession() injects SESSION_MARKUP into #session-root
         below, and (embedded:false) mounts the shared sidebar's data loop/SSE via mountShell(). This keeps
         the standalone visit on the same shared sidebar as the SPA — one source, no drift. -->
    <div id="shell" class="dk-shell">
      <aside class="dk-side" id="dk-side" data-dk-sidebar>
        <div class="dk-brand"><span class="dk-wordmark">Supercalm</span><span class="dk-sub">agent OS</span><button class="dk-collapse" data-dk-collapse type="button" title="Collapse sidebar" aria-label="Collapse sidebar">‹ collapse</button></div>
        <button class="dk-counters" id="dk-counters" data-dk-counters title="Open the Inbox"></button>
        <button class="dk-cmdk" id="dk-cmdk-row"><span>⌘K</span> jump to…</button>
        <nav class="dk-nav">
          <a class="dk-nav-item" data-nav="inbox" href="./">Sessions <span class="dk-badge warn" id="dk-inbox-badge" hidden></span><span class="dk-nav-plus" id="dk-sess-plus" title="New session" role="button" tabindex="0">+</span></a>
          <a class="dk-nav-item" data-nav="projects" href="projects">Projects <span class="dk-nav-plus" id="dk-proj-plus" title="Add project">+</span></a>
        </nav>
        <div class="dk-sec">SESSIONS</div>
        <div class="dk-sessions" id="dk-sessions" data-dk-sessions></div>
        <div class="dk-sec">SYSTEM</div>
        <nav class="dk-nav">
          <a class="dk-nav-item" href="decisions" data-nav="decisions">Decisions</a>
          <a class="dk-nav-item" href="records" data-nav="records">Records</a>
          <a class="dk-nav-item" href="usage" data-nav="usage">Usage</a>
          <a class="dk-nav-item" href="health" data-nav="health">Health <span class="dk-dot warn" id="dk-health-dot" hidden></span></a>
          <a class="dk-nav-item" href="settings" data-nav="settings">Settings</a>
        </nav>
        <div class="dk-foot" id="dk-foot"></div>
        <a class="dk-classic" href="./?classic=1" title="The pre-redesign dashboard">classic view</a>
      </aside>
      <main class="dk-view" id="view">
        <div id="session-root"></div>
      </main>
    </div>

    <!-- app-shell overlays (⌘K palette + toast), body-level like app.html -->
    <div id="dk-palette" class="dk-palette" data-dk-palette hidden>
      <div class="dk-palette-box">
        <input id="dk-palette-q" placeholder="Jump to a screen, session, or action…" autocomplete="off" />
        <div id="dk-palette-list"></div>
      </div>
    </div>
    <div id="dk-toast" class="dk-toast" hidden></div>

    <script src="vendor/xterm.js"></script>
    <script src="vendor/xterm-fit.js"></script>
    <script type="module">
      import { mountSession } from './session.js';
      const id = new URLSearchParams(location.search).get('id');
      mountSession(document.getElementById('session-root'), { id, embedded: false });
    </script>
    <script type="module" src="version-badge.js"></script>
  </body>
</html>
