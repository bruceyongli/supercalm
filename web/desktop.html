<!doctype html>
<html lang="en">
<head>
  <script>
    // Mobile DASHBOARD = the phone triage view by default (it's the mobile-optimized dashboard). Opt into
    // the desktop dashboard on a phone with ?desktop=1 (remembered); ?phone=1 clears it. Individual
    // sessions open the SPA's full session view — browse in phone, read in the desktop story.
    // ?classic=1 still falls back to the pre-redesign dashboard (index.html).
    (() => {
      const q = new URLSearchParams(location.search);
      try {
        if (q.get('desktop') === '1') localStorage.setItem('aios_dash', 'desktop');
        else if (q.get('phone') === '1') localStorage.removeItem('aios_dash');
      } catch {}
      let dashDesktop = false;
      try { dashDesktop = localStorage.getItem('aios_dash') === 'desktop'; } catch {}
      if (dashDesktop) return;
      if (Math.min(screen.width, innerWidth || 1e4) <= 720) location.replace('phone');
    })();
  </script>
  <meta charset="utf-8" />
  <base href="./" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0e14" />
  <title>Supercalm</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="desktop.css" />
</head>
<body>
  <div id="shell" class="dk-shell">
    <aside class="dk-side" id="dk-side" data-dk-sidebar>
      <div class="dk-brand"><span class="dk-wordmark">Supercalm</span><span class="dk-sub">agent OS</span><button class="dk-collapse" data-dk-collapse type="button" title="Collapse sidebar" aria-label="Collapse sidebar">‹ collapse</button></div>
      <button class="dk-counters" id="dk-counters" data-dk-counters title="Open the Inbox"></button>
      <button class="dk-cmdk" id="dk-cmdk-row"><span>⌘K</span> jump to…</button>
      <nav class="dk-nav">
        <a class="dk-nav-item active" data-nav="inbox" href="./">Sessions <span class="dk-badge warn" id="dk-inbox-badge" hidden></span><span class="dk-nav-plus" id="dk-sess-plus" title="New session" role="button" tabindex="0">+</span></a>
        <a class="dk-nav-item" data-nav="projects" href="projects">Projects <span class="dk-nav-plus" id="dk-proj-plus" title="Add project">+</span></a>
      </nav>
      <div class="dk-sec">SESSIONS</div>
      <div class="dk-sessions" id="dk-sessions" data-dk-sessions></div>
      <div class="dk-sec">SYSTEM</div>
      <nav class="dk-nav">
        <a class="dk-nav-item" href="decisions" data-nav="decisions">Decisions</a>
        <a class="dk-nav-item" href="records" data-nav="records">Records</a>
        <a class="dk-nav-item" href="usage" data-nav="usage">Usage</a>
        <a class="dk-nav-item" href="health" data-nav="health">Health <span class="dk-dot warn" id="dk-health-dot" hidden></span></a>
        <a class="dk-nav-item" href="settings" data-nav="settings">Settings</a>
      </nav>
      <div class="dk-foot" id="dk-foot"></div>
      <a class="dk-classic" href="./?classic=1" title="The pre-redesign dashboard">classic view</a>
    </aside>
    <main class="dk-main" id="dk-main">
      <section id="dk-inbox" data-dk-inbox>
        <div class="dk-page-head">
          <h1>Needs you <span class="dk-badge warn" id="dk-needs-count" hidden></span></h1>
          <div class="dk-page-actions">
            <button class="dk-refresh" id="dk-needs-refresh" title="Refresh Needs you from the server">↻ Refresh</button>
            <button class="dk-voice" id="dk-voice" title="Hands-free pass over the needs-you queue">● Voice</button>
          </div>
        </div>
        <div id="dk-cards" data-dk-cards></div>
        <section class="dk-dismissed" id="dk-dismissed-section" hidden>
          <button class="dk-dismissed-toggle" id="dk-dismissed-toggle" aria-expanded="false">
            <span data-dk-dismissed-chevron>▸</span> Dismissed <span id="dk-dismissed-count">0</span>
          </button>
          <div id="dk-dismissed-rows" hidden></div>
        </section>
        <div class="dk-sec-row">SESSIONS</div>
        <div id="dk-rows"></div>
      </section>
    </main>
  </div>
  <div id="dk-palette" class="dk-palette" data-dk-palette hidden>
    <div class="dk-palette-box">
      <input id="dk-palette-q" placeholder="Jump to a screen, session, or action…" autocomplete="off" />
      <div id="dk-palette-list"></div>
    </div>
  </div>
  <div id="dk-toast" class="dk-toast" hidden></div>
  <script type="module" src="desktop.js"></script>
  <script type="module" src="version-badge.js"></script>
</body>
</html>
