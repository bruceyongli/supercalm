<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <base href="/aios/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1117" />
    <title>Supercalm · health</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .health-wrap { max-width: 1180px; margin: 0 auto; padding: 14px; }
      .health-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin: 14px 0; }
      .health-card { border: 1px solid #21262d; border-radius: 8px; padding: 13px; background: #0f141b; min-height: 92px; }
      .health-card h2 { margin: 0 0 10px; font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.08em; }
      .health-num { font-size: 30px; font-weight: 800; color: #e6edf3; line-height: 1; }
      .health-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 8px 0; border-top: 1px solid #1c2230; }
      .health-row:first-child { border-top: 0; }
      .health-meta { color: #8b949e; font-size: 12px; }
      .health-ok { color: #3fb950; }
      .health-warn { color: #f85149; }
      .health-info { color: #d29922; }
      .health-table { width: 100%; border-collapse: collapse; font-size: 12px; }
      .health-table th, .health-table td { border-top: 1px solid #1c2230; text-align: left; padding: 8px 6px; vertical-align: top; }
      .health-table th { color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
      .health-section { border: 1px solid #21262d; border-radius: 8px; background: #0f141b; padding: 13px; margin: 10px 0; }
      .health-section h2 { margin: 0 0 8px; font-size: 14px; }
      @media (max-width: 800px) { .health-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header>
      <div class="brand"><a href=".">←</a> <h1>Health</h1></div>
      <div class="spacer"></div>
      <span class="pill" id="health-pill">…</span>
    </header>
    <main class="health-wrap" id="health-root">
      <div class="empty">Loading health…</div>
    </main>
    <script type="module" src="health.js"></script>
    <script type="module" src="version-badge.js"></script>
  </body>
</html>
